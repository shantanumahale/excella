services:
  # ─── Data Stores ───────────────────────────────────────────
  postgres:
    image: timescale/timescaledb:latest-pg16
    command: postgres -c max_locks_per_transaction=512
    environment:
      POSTGRES_USER: excella
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-excella_dev}
      POSTGRES_DB: excella
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/home/postgres/pgdata/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/01_init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U excella"]
      interval: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: excella
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-excella_dev}
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 10s
      retries: 5

  elasticsearch:
    image: elasticsearch:8.13.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - esdata:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: excella
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:-excella_dev_key}
    ports:
      - "9002:9000"
      - "9003:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      retries: 5

  # ─── Application ───────────────────────────────────────────
  api:
    build:
      context: ./src
      dockerfile: Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./src:/code
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  worker:
    build:
      context: ./src
      dockerfile: Dockerfile
    command: python -m app.worker
    env_file: .env
    volumes:
      - ./src:/code
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  scheduler:
    build:
      context: ./src
      dockerfile: Dockerfile
    command: python -m app.scheduler
    env_file: .env
    volumes:
      - ./src:/code
    depends_on:
      rabbitmq:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - BACKEND_URL=http://api:8000
      - NEXT_PUBLIC_APP_URL=http://localhost:3000
    depends_on:
      - api

volumes:
  pgdata:
  esdata:
  miniodata:
